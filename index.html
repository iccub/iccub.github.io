<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Store Loop Test</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: Canvas;
      color: CanvasText;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(640px, 100%);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 24px;
      color: color-mix(in srgb, CanvasText 72%, Canvas 28%);
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 16px 0 6px;
      font-weight: 600;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid color-mix(in srgb, CanvasText 24%, Canvas 76%);
      border-radius: 6px;
      padding: 10px 12px;
      background: Canvas;
      color: CanvasText;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 12px;
      align-items: end;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      cursor: pointer;
    }

    #start {
      background: #0a7aff;
      color: white;
    }

    #stop {
      background: color-mix(in srgb, CanvasText 12%, Canvas 88%);
      color: CanvasText;
    }

    button:disabled {
      cursor: default;
      opacity: 0.5;
    }

    #status {
      margin-top: 18px;
      min-height: 22px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    iframe {
      position: absolute;
      width: 1px;
      height: 1px;
      border: 0;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 520px) {
      .row,
      .actions {
        display: block;
      }

      .actions button {
        width: 100%;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>App Store Loop Test</h1>
    <p>Press Start to repeatedly trigger an App Store URL. Keep the interval reasonably high so you can return to the browser and stop it.</p>

    <label for="url">App Store URL</label>
    <input id="url" value="itms-apps://itunes.apple.com/app/id1484498200" spellcheck="false">

    <div class="row">
      <div>
        <label for="mode">Open mode</label>
        <select id="mode">
          <option value="location">Top-level navigation</option>
          <option value="iframe">Hidden iframe</option>
          <option value="anchor">Synthetic anchor click</option>
        </select>
      </div>

      <div>
        <label for="interval">Interval, ms</label>
        <input id="interval" type="number" min="500" step="500" value="2000">
      </div>
    </div>

    <div class="actions">
      <button id="start" type="button">Start</button>
      <button id="stop" type="button" disabled="">Stop</button>
      <button id="once" type="button">Open Once</button>
    </div>

    <div id="status" role="status" aria-live="polite">Idle</div>
  </main>

  <iframe id="opener" title="App Store opener" src="./App Store Loop Test_files/saved_resource.html"></iframe>

  <script>
    const urlInput = document.getElementById("url");
    const modeInput = document.getElementById("mode");
    const intervalInput = document.getElementById("interval");
    const startButton = document.getElementById("start");
    const stopButton = document.getElementById("stop");
    const onceButton = document.getElementById("once");
    const status = document.getElementById("status");
    const opener = document.getElementById("opener");

    let timer = 0;
    let count = 0;

    function appStoreUrl() {
      return urlInput.value.trim();
    }

    function intervalMs() {
      return Math.max(Number(intervalInput.value) || 2000, 500);
    }

    function setRunning(isRunning) {
      startButton.disabled = isRunning;
      stopButton.disabled = !isRunning;
      onceButton.disabled = isRunning;
      urlInput.disabled = isRunning;
      modeInput.disabled = isRunning;
      intervalInput.disabled = isRunning;
    }

    function openAppStore() {
      const url = appStoreUrl();
      const mode = modeInput.value;

      if (!url) {
        stopLoop();
        status.textContent = "Stopped: URL is empty";
        return;
      }

      count += 1;
      status.textContent = `Attempt ${count}: ${mode} -> ${url}`;

      if (mode === "iframe") {
        opener.src = "about:blank";
        setTimeout(() => {
          opener.src = url;
        }, 0);
        return;
      }

      if (mode === "anchor") {
        const link = document.createElement("a");
        link.href = url;
        link.rel = "noreferrer";
        document.body.appendChild(link);
        link.click();
        link.remove();
        return;
      }

      window.location.href = url;
    }

    function startLoop() {
      stopLoop();
      count = 0;
      setRunning(true);
      openAppStore();
      timer = window.setInterval(openAppStore, intervalMs());
    }

    function stopLoop() {
      if (timer) {
        window.clearInterval(timer);
        timer = 0;
      }
      setRunning(false);
      status.textContent = count ? `Stopped after ${count} attempt(s)` : "Idle";
    }

    startButton.addEventListener("click", startLoop);
    stopButton.addEventListener("click", stopLoop);
    onceButton.addEventListener("click", openAppStore);
    window.addEventListener("pagehide", stopLoop);
  </script>


</body></html>
